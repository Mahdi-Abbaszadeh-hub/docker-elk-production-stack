version: '3.8'

services:
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          memory: 1gb
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata1:/usr/share/elasticsearch/data
    networks:
      - elastic

  kibana:
    image: kibana:8.13.0
    container_name: kibana
    ports:
      - "5601:5601"
    networks:
      - elastic
    depends_on:
      - elasticsearch

  logstash:
    image: logstash:8.13.0
    container_name: logstash
    volumes:
      - ./config:/etc/logstash/conf.d
    ports:
      - "5010:5000"
    command: logstash -f /etc/logstash/conf.d/logstash.conf
    networks:
      - elastic
    depends_on:
      - elasticsearch

volumes:
  esdata1:
    driver: local

networks:
  elastic:
    driver: bridge